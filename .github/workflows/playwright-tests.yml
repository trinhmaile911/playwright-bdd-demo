name: Playwright BDD Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-smoke:
    name: Smoke Tests Only
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Install Allure CLI
        run: |
          sudo wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          sudo tar -zxvf allure-2.24.0.tgz -C /opt/
          sudo ln -s /opt/allure-2.24.0/bin/allure /usr/bin/allure
          allure --version

      - name: Create .env file
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}" >> .env
          echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME || 'Admin' }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD || 'admin123' }}" >> .env
          echo "HEADLESS=true" >> .env

      - name: Run smoke tests
        run: |
          pytest steps/ -m smoke -v --html=smoke-report.html --self-contained-html --alluredir=allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Smoke Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload Allure Report to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4